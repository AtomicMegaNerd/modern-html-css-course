<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h2>Image With a Relative Path</h2>
    <!-- Relative Path -->
    <img
      src="images/landscape.jpg"
      alt="Landscape"
      width="400"
      title="A beautiful landscape"
    />

    <h2>Image With an Absolute Path</h2>
    <!-- Absolute Path -->
    <img
      src="http://127.0.0.1:8080/images/landscape.jpg"
      alt="Landscape Absolute"
      width="400"
      title="A beautiful landscape"
    />

    <h2>Fig and Figcaption</h2>
    <!-- fig and figcaption -->
    <figure>
      <img src="images/landscape.jpg" alt="Landscape" width="400" />
      <figcaption>Fig.1 Beautiful Landscape</figcaption>
    </figure>
  </body>
</html>
