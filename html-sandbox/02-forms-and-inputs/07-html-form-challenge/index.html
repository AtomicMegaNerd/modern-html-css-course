<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .form-cell {
        padding: 0.3em;
      }
    </style>
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>Apartment Search</h1>
  </body>
  <div class="main-form">
    <form>
      <div class="form-cell">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" required />
      </div>
      <div class="form-cell">
        <label for="price">Monthly Price</label>
        <input
          type="range"
          name="price"
          id="price"
          min="0"
          max="5000"
          step="100"
          value="1000"
        />
      </div>
      <div class="form-cell">
        <label for="bedrooms">Bedrooms</label>
        <input
          type="number"
          name="bedrooms"
          id="bedrooms"
          min="0"
          max="10"
          value="1"
          required
        />
      </div>
      <div class="form-cell">
        <label for="bathrooms">Bathrooms</label>
        <input
          type="number"
          name="bathrooms"
          id="bathrooms"
          min="0"
          max="10"
          value="1"
          required
        />
      </div>
      <div class="form-cell">
        <label for="pets">Pets Allowed</label>
        <input type="checkbox" name="pets" id="pets" />
      </div>
      <div class="form-cell">
        <label for="date_avail">Date Available</label>
        <input type="date" name="date_avail" id="date_avail" required />
      </div>
      <div class="form-cell">
        <input type="submit" value="Submit" />
      </div>
    </form>
  </div>
</html>
